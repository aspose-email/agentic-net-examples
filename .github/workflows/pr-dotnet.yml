name: pr-dotnet

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-run-examples:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install native Linux dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1 \
            libfreetype6 \
            libjpeg62-turbo \
            libpng16-16 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libglib2.0-0

      - name: Find changed example files
        id: files
        run: |
          set -euo pipefail

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.sha }}"
          FILE_LIST="$RUNNER_TEMP/files.txt"

          git diff --name-only --diff-filter=ACMRT "origin/$BASE...$HEAD" -- '*.cs' > "$FILE_LIST"

          if [ ! -s "$FILE_LIST" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No changed .cs files" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          COUNT=$(wc -l < "$FILE_LIST")
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "file_list=$FILE_LIST" >> "$GITHUB_OUTPUT"

          echo "### Changed files ($COUNT)" >> "$GITHUB_STEP_SUMMARY"
          sed 's/^/- /' "$FILE_LIST" >> "$GITHUB_STEP_SUMMARY"

      - name: Test each example using harness
        if: steps.files.outputs.found == 'true'
        run: |
          set -euo pipefail

          FILE_LIST="${{ steps.files.outputs.file_list }}"

          TOTAL=$(wc -l < "$FILE_LIST")
          CURRENT=0
          PASSED=0

          while IFS= read -r f || [ -n "$f" ]; do
            CURRENT=$((CURRENT+1))

            echo ""
            echo "=============================="
            echo "[$CURRENT/$TOTAL] $f"
            echo "=============================="

            workdir=$(mktemp -d)

            # Copy harness project
            cp -R .github/dotnet-example-runner/* "$workdir/"

            # Replace Program.cs
            cp "$f" "$workdir/Program.cs"

            pushd "$workdir" >/dev/null

            echo "Restoring..."
            dotnet restore -r linux-x64

            echo "Publishing..."
            dotnet publish -c Release -r linux-x64 --self-contained false -o publish

            echo "Checking Skia native library..."
            find publish -name "*Skia*" || true

            DLL=$(find publish -maxdepth 1 -name '*.dll' \
              ! -name 'Aspose.*.dll' \
              ! -name 'System.*.dll' \
              ! -name 'Microsoft.*.dll' \
              ! -name 'SkiaSharp*.dll' | head -n 1)

            if [ -z "$DLL" ]; then
              echo "::error file=$f::No runnable DLL found"
              exit 1
            fi

            echo "Running..."
            if ! dotnet "$DLL"; then
              echo "::error file=$f::Execution failed"
              exit 1
            fi

            popd >/dev/null
            rm -rf "$workdir"

            PASSED=$((PASSED+1))

            echo "PASSED: $f"
            echo "- ✅ $f" >> "$GITHUB_STEP_SUMMARY"

          done < "$FILE_LIST"

          echo ""
          echo "Completed: $PASSED / $TOTAL passed"
